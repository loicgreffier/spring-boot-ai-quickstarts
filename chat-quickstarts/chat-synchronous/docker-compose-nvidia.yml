---
services:
  ollama:
    image: ollama/ollama:0.30.11
    hostname: ollama
    container_name: ollama
    networks:
      - spring-boot-ai-quickstarts
    ports:
      - "11434:11434"
    restart: unless-stopped
    environment:
      SSL_CERT_FILE: ${OLLAMA_CA_CERT:+/etc/ssl/certs/corporate-ca.crt}
    volumes:
      - ${OLLAMA_CA_CERT:-/dev/null}:/etc/ssl/certs/corporate-ca.crt:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ "gpu" ]
              count: all

  chat:
    image: loicgreffier/spring-boot-ai-quickstarts:chat-1.0.0
    hostname: chat
    container_name: chat
    networks:
      - spring-boot-ai-quickstarts
    depends_on:
      - ollama
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_JSON: |
        {
          "spring": {
            "ai": {
              "ollama": {
                "base-url": "http://ollama:11434",
                "chat": {
                  "model": "qwen3.5:9b"
                }
              }
            }
          }
        }

networks:
  spring-boot-ai-quickstarts:
    driver: bridge
